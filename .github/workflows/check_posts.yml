name: Social Media Slack Alerts

on:
  schedule:
    - cron: '0 8,13,18 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Run check
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          LINKEDIN_LI_AT: ${{ secrets.LINKEDIN_LI_AT }}
          X_AUTH_TOKEN: ${{ secrets.X_AUTH_TOKEN }}
          X_CT0: ${{ secrets.X_CT0 }}
        run: python check_posts.py

      - name: Save seen posts
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add seen_posts.json || true
          git diff --staged --quiet || git commit -m "Update seen posts"
          git push || true
